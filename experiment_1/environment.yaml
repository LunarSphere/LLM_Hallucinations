name: egoblind_exp1
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pytorch=2.3.0
  - torchvision=0.18.0
  - pytorch-cuda=11.8
  - pip
  - pip:
    - transformers==4.46.0
    - accelerate>=0.32.0
    - decord>=0.6.0
    - Pillow>=10.0.0
    - numpy>=1.24.0
    - pandas>=2.0.0
    - openai>=1.30.0
    - tenacity>=8.2.0
    - einops>=0.7.0
    - timm>=0.9.0
    - sentencepiece>=0.1.99
    - tabulate>=0.9.0
    # flash-attn must be installed separately after activating the env:
    # pip install flash-attn --no-build-isolation
